name: Build and deploy to Dev then Prod

on:
  push:
    branches:
      - master
  workflow_dispatch:

env:
  AZURE_FUNCTIONAPP_PACKAGE_PATH: "app"
  NODE_VERSION: "20.x"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install and test
        run: |
          pushd './app'
          npm install
          npm test
          popd

      - name: Zip artifact
        run: |
          pushd './app'
          zip -r ../release.zip .
          popd

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: release.zip

  deploy-dev:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Unzip artifact
        run: unzip release.zip -d app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_DA2B30A8B5C74D2A9E4BC19B723CDF1E }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_B7CEEA6087D843D38AB3F2C281B178C8 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_E75E50C48C764D00B1AC446C73D1E4D5 }}

      - name: Deploy to Dev
        uses: Azure/functions-action@v1
        with:
          app-name: "func-healthplans-dev"
          slot-name: "Production"
          package: "app"

  deploy-prod:
    runs-on: ubuntu-latest
    needs: deploy-dev
    environment: production
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Unzip artifact
        run: unzip release.zip -d app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_DA2B30A8B5C74D2A9E4BC19B723CDF1E }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_B7CEEA6087D843D38AB3F2C281B178C8 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_E75E50C48C764D00B1AC446C73D1E4D5 }}

      - name: Deploy to Prod
        uses: Azure/functions-action@v1
        with:
          app-name: "func-healthplans-prod"
          slot-name: "Production"
          package: "app"
